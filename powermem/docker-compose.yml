version: "3.8"

services:
  oceanbase:
    image: oceanbase/oceanbase-ce:latest
    container_name: oceanbase
    ports:
      - "2881:2881" # SQL 端口
      - "2882:2882" # RPC 端口
    environment:
      - MODE=mini
      - OB_ROOT_PASSWORD=powermem123 # sys 租户密码
    volumes:
      - oceanbase-data:/root/ob
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "obclient",
          "-h127.0.0.1",
          "-P2881",
          "-uroot",
          "-ppowermem123",
          "-e",
          "SELECT 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  oceanbase-data:
